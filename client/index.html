<!doctype html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASK AI APP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body id="bodyId">
  <div class="container">
    <h1>ASK AI APP</h1>
    <p class="subtitle">Your smart assistant for quick answers.</p>

<div id="chatBox" class="chat-box">
    <div class="empty-state" id="emptyState">
        <!-- <div class="empty-state-icon">✦</div> -->
        <p>Ask me anything and I'll answer in seconds....</p>
    </div>
    <div class="message ai loading hidden" id="loader">
        <div class="typing">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</div>

    <form id="chatForm">
      <textarea name="message" id="message" placeholder="Ask me anything...." rows="1"></textarea>
      <button type="submit" id="sendBtn" aria-label="إرسال" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3.4 20.6L21 12 3.4 3.4l-.4 6.8L15 12 3 14.8z" fill="currentColor"/>
        </svg>
      </button>
    </form>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
  <script src="js/script.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.cells.min.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", function () {
      if (window.VANTA) {
        window.VANTA.CELLS({
          el: "#bodyId",
          mouseControls: true,
          touchControls: true,
          gyroControls: false,
          minHeight: 200.00,
          minWidth: 200.00,
          scale: 1.00,
          color2: 0x3d80bd,
          size: 4.00,
          speed: 0.70
        });
      }
    });
  </script>
</body>

</html>
